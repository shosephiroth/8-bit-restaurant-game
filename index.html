<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Restaurant Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #202020;
            color: #E0E0E0;
            image-rendering: pixelated;
        }
        .game-container {
            border: 4px solid #505050;
            background-color: #303030;
        }
        .panel {
            border: 2px solid #505050;
            background-color: #282828;
        }
        .btn {
            border: 2px solid #505050;
            background-color: #404040;
            color: #E0E0E0;
            text-transform: uppercase;
            transition: all 0.1s ease-in-out;
        }
        .btn:hover {
            background-color: #606060;
            color: #FFFFFF;
            transform: translateY(-2px);
            box-shadow: 0 2px 0 #505050;
        }
        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }
        .log-message {
            border-bottom: 1px dashed #404040;
        }
        .json-textarea {
            background-color: #1a1a1a;
            border: 2px solid #505050;
            color: #E0E0E0;
            font-family: monospace;
            font-size: 12px;
        }
        .text-green-pixel { color: #32CD32; }
        .text-red-pixel { color: #FF4136; }
        .text-yellow-pixel { color: #FFDC00; }
        .text-blue-pixel { color: #0074D9; }
        .text-purple-pixel { color: #B10DC9; }
        /* Custom scrollbar for a retro feel */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #282828; border-left: 2px solid #505050; }
        ::-webkit-scrollbar-thumb { background: #505050; border: 2px solid #282828; }
        ::-webkit-scrollbar-thumb:hover { background: #606060; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="game-container" class="game-container max-w-7xl mx-auto p-4 rounded-lg shadow-lg">
        <header class="text-center mb-6">
            <h1 class="text-3xl md:text-4xl text-yellow-pixel">8-Bit Restaurant</h1>
            <p class="text-sm text-gray-400">Your journey to culinary stardom!</p>
        </header>

        <!-- Stats Bar -->
        <div id="stats-bar" class="panel grid grid-cols-2 md:grid-cols-5 gap-4 p-4 mb-6 rounded-md text-center">
            <div>
                <p class="text-sm text-gray-400">Day</p>
                <p id="day-display" class="text-2xl text-blue-pixel">1</p>
            </div>
             <div>
                <p class="text-sm text-gray-400">Timezone</p>
                <p id="timezone-display" class="text-lg text-blue-pixel">Local</p>
            </div>
            <div>
                <p class="text-sm text-gray-400">Cash</p>
                <p id="cash-display" class="text-2xl text-green-pixel">$500</p>
            </div>
            <div>
                <p class="text-sm text-gray-400">Revenue</p>
                <p id="revenue-display" class="text-2xl text-green-pixel">$0</p>
            </div>
            <div>
                <p class="text-sm text-gray-400">Expenses</p>
                <p id="expenses-display" class="text-2xl text-red-pixel">$0</p>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div id="menu-panel" class="panel p-4 rounded-md"><h2 class="text-lg mb-4 text-yellow-pixel">Menu</h2><div id="menu-items" class="space-y-3"></div></div>
                <div id="employees-panel" class="panel p-4 rounded-md"><h2 class="text-lg mb-4 text-yellow-pixel">Employees</h2><div id="employee-list" class="space-y-2 mb-4"></div><button id="hire-btn" class="btn w-full py-2 rounded-md">Hire Cook ($100/day)</button></div>
            </div>
            <div class="lg:col-span-1 space-y-6">
                <div id="stock-panel" class="panel p-4 rounded-md"><h2 class="text-lg mb-4 text-yellow-pixel">Ingredient Stock</h2><div id="stock-items" class="space-y-3"></div></div>
                <div id="actions-panel" class="panel p-4 rounded-md space-y-3"><h2 class="text-lg mb-2 text-yellow-pixel">Actions</h2><button id="next-day-btn" class="btn w-full py-3 rounded-md text-xl">Start Next Day</button><button id="timezone-btn" class="btn w-full py-2 rounded-md">Toggle Timezone</button><button id="json-log-btn" class="btn w-full py-2 rounded-md">View JSON Log</button></div>
            </div>
            <div class="lg:col-span-1"><div id="log-panel" class="panel p-4 rounded-md h-full"><h2 class="text-lg mb-4 text-yellow-pixel">Daily Log</h2><div id="game-log" class="h-96 overflow-y-auto pr-2 space-y-2 text-sm"></div></div></div>
        </div>
    </div>
    
    <div id="game-over-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50"><div class="panel p-8 rounded-lg text-center max-w-sm"><h2 class="text-3xl text-red-pixel mb-4">Game Over</h2><p id="game-over-message" class="mb-6">You've run out of money!</p><button id="restart-btn" class="btn px-8 py-3 rounded-md text-lg">Restart Game</button></div></div>
    <div id="json-log-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50"><div class="panel p-6 rounded-lg text-center max-w-2xl w-full"><h2 class="text-2xl text-yellow-pixel mb-4">Daily Log (JSON)</h2><textarea id="json-log-textarea" readonly class="json-textarea w-full h-64 p-2 rounded-md mb-4"></textarea><div class="flex gap-4"><button id="copy-log-btn" class="btn flex-1 py-2 rounded-md">Copy to Clipboard</button><button id="close-log-btn" class="btn flex-1 py-2 rounded-md">Close</button></div></div></div>

    <script>
        // DOM Elements
        const dayDisplay = document.getElementById('day-display');
        const timezoneDisplay = document.getElementById('timezone-display');
        const cashDisplay = document.getElementById('cash-display');
        const revenueDisplay = document.getElementById('revenue-display');
        const expensesDisplay = document.getElementById('expenses-display');
        const menuItemsContainer = document.getElementById('menu-items');
        const employeeListContainer = document.getElementById('employee-list');
        const stockItemsContainer = document.getElementById('stock-items');
        const gameLogContainer = document.getElementById('game-log');
        const nextDayBtn = document.getElementById('next-day-btn');
        const hireBtn = document.getElementById('hire-btn');
        const timezoneBtn = document.getElementById('timezone-btn');
        const jsonLogBtn = document.getElementById('json-log-btn');
        const gameOverModal = document.getElementById('game-over-modal');
        const gameOverMessage = document.getElementById('game-over-message');
        const restartBtn = document.getElementById('restart-btn');
        const jsonLogModal = document.getElementById('json-log-modal');
        const jsonLogTextarea = document.getElementById('json-log-textarea');
        const copyLogBtn = document.getElementById('copy-log-btn');
        const closeLogBtn = document.getElementById('close-log-btn');

        let gameState = {};

        // --- GAME DATA ---
        const INGREDIENTS = { flour: { name: 'Flour', cost: 2 }, sugar: { name: 'Sugar', cost: 3 }, eggs: { name: 'Eggs', cost: 4 }, cheese: { name: 'Cheese', cost: 5 }, tomato: { name: 'Tomato', cost: 3 }, dough: { name: 'Dough', cost: 4 }, potato: { name: 'Potato', cost: 1 }, beef: { name: 'Beef', cost: 8 }, bun: { name: 'Bun', cost: 2 }, lettuce: { name: 'Lettuce', cost: 2 }, milkshake_mix: { name: 'Milkshake Mix', cost: 6 }, fancy_cheese: { name: 'Fancy Cheese', cost: 9}, bacon: { name: 'Bacon', cost: 7} };
        const MENU = { bread: { name: 'Bread', price: 8, ingredients: { flour: 2, eggs: 1 } }, cake: { name: 'Cake', price: 15, ingredients: { flour: 3, sugar: 4, eggs: 2 } }, pizza: { name: 'Pizza', price: 20, ingredients: { dough: 1, cheese: 2, tomato: 2 } }, fries: { name: 'Fries', price: 7, ingredients: { potato: 3 } }, burger: { name: 'Burger', price: 25, ingredients: { beef: 1, bun: 1, lettuce: 1 } }, milkshake: { name: 'Milkshake', price: 12, ingredients: { milkshake_mix: 1, sugar: 1 } }, deluxe_burger: { name: 'Deluxe Burger', price: 35, ingredients: { beef: 1, bun: 1, fancy_cheese: 1, bacon: 1 } }, gourmet_pizza: { name: 'Gourmet Pizza', price: 45, ingredients: { dough: 1, fancy_cheese: 2, bacon: 2, tomato: 1 } } };
        const EMPLOYEE_TYPES = { cook: { name: 'Cook', salary: 100, efficiency: 10 } };
        const UNLOCKS = [ { day: 3, ingredients: ['potato', 'beef', 'bun'], menu: ['fries', 'burger'], message: "New items available: Fries and Burgers!" }, { day: 5, ingredients: ['lettuce', 'milkshake_mix'], menu: ['milkshake'], message: "You can now sell Milkshakes!" }, { day: 10, ingredients: ['fancy_cheese', 'bacon'], menu: [], message: "Premium ingredients unlocked!" }, { day: 14, menu: ['deluxe_burger'], message: "A new creation: The Deluxe Burger!" }, { day: 30, menu: ['gourmet_pizza'], message: "Master Chef! You've unlocked the Gourmet Pizza!" } ];
        const OPEN_HOUR = 8;
        const CLOSE_HOUR = 22;

        // --- TIME & DATE HELPERS ---
        function getCurrentGameDate(hour, minute = 0, second = 0) {
            const date = new Date(gameState.gameStartDate);
            date.setDate(date.getDate() + gameState.day - 1);
            date.setHours(hour, minute, second, 0);
            return date;
        }

        function formatTimestamp(date) {
            if (gameState.timeZone === 'local') {
                return date.toLocaleString();
            } else {
                return date.toUTCString();
            }
        }

        // --- CORE GAME FUNCTIONS ---
        function initGame() {
            gameState = {
                day: 1,
                cash: 500,
                dailyRevenue: 0,
                dailyExpenses: 0,
                employees: [],
                stock: { flour: 20, sugar: 20, eggs: 15, cheese: 10, tomato: 10, dough: 10, potato: 0, beef: 0, bun: 0, lettuce: 0, milkshake_mix: 0, fancy_cheese: 0, bacon: 0 },
                unlockedIngredients: ['flour', 'sugar', 'eggs', 'cheese', 'tomato', 'dough'],
                unlockedMenuItems: ['bread', 'cake', 'pizza'],
                log: [],
                isGameOver: false,
                gameStartDate: new Date(),
                timeZone: 'local', // 'local' or 'UTC'
            };
            logMessage({ type: 'SYSTEM', message: "Welcome! Let's get cooking!", color: 'text-yellow-pixel' });
            updateUI();
            gameOverModal.classList.add('hidden');
            jsonLogModal.classList.add('hidden');
        }

        function nextDay() {
            if (gameState.isGameOver) return;

            // 1. Reset daily stats and clear log
            gameState.dailyRevenue = 0;
            gameState.dailyExpenses = 0;
            gameState.log = [];
            
            // 2. Pay Employees at the start of the day
            const totalSalary = gameState.employees.reduce((sum, emp) => sum + emp.salary, 0);
            if (totalSalary > 0) {
                gameState.cash -= totalSalary;
                gameState.dailyExpenses += totalSalary;
                logMessage({
                    type: 'EXPENSE',
                    message: `Paid $${totalSalary} in salaries.`,
                    color: 'text-red-pixel',
                    details: { amount: totalSalary, reason: 'Salaries', cashAfter: gameState.cash }
                }, getCurrentGameDate(OPEN_HOUR));
            }

            // 3. Simulate hourly sales
            const maxCustomersPerHour = Math.ceil(gameState.employees.reduce((sum, emp) => sum + emp.efficiency, 5) / (CLOSE_HOUR - OPEN_HOUR));
            for (let hour = OPEN_HOUR; hour < CLOSE_HOUR; hour++) {
                const customersThisHour = Math.floor(Math.random() * (maxCustomersPerHour + 1));
                for (let i = 0; i < customersThisHour; i++) {
                    const minute = Math.floor(Math.random() * 60);
                    const second = Math.floor(Math.random() * 60);
                    sellMenuItem(getCurrentGameDate(hour, minute, second));
                }
            }

            // 4. Day-end summary and checks
            logMessage({ type: 'SYSTEM', message: `Day ${gameState.day} summary: Revenue: $${gameState.dailyRevenue}, Expenses: $${gameState.dailyExpenses}.`, color: 'text-yellow-pixel' }, getCurrentGameDate(CLOSE_HOUR));
            
            gameState.day++;
            checkForUnlocks();

            if (gameState.cash < 0) endGame("You've run out of money and fallen into debt!");
            else if (gameState.cash > 10000) endGame("Congratulations! You've built a restaurant empire!");
            
            updateUI();
        }

        function checkForUnlocks() {
            const unlock = UNLOCKS.find(u => u.day === gameState.day);
            if (unlock) {
                if (unlock.ingredients) gameState.unlockedIngredients.push(...unlock.ingredients);
                if (unlock.menu) gameState.unlockedMenuItems.push(...unlock.menu);
                logMessage({ type: 'UNLOCK', message: `LEVEL UP! ${unlock.message}`, color: 'text-purple-pixel', details: { unlocked: unlock } }, getCurrentGameDate(OPEN_HOUR));
            }
        }

        function sellMenuItem(date) {
            const randomItemKey = gameState.unlockedMenuItems[Math.floor(Math.random() * gameState.unlockedMenuItems.length)];
            const item = MENU[randomItemKey];

            let canMake = Object.entries(item.ingredients).every(([ingKey, amount]) => gameState.stock[ingKey] >= amount);

            if (canMake) {
                Object.entries(item.ingredients).forEach(([ingKey, amount]) => gameState.stock[ingKey] -= amount);
                gameState.cash += item.price;
                gameState.dailyRevenue += item.price;
                logMessage({
                    type: 'SALE',
                    message: `Sold a ${item.name} for $${item.price}.`,
                    color: 'text-green-pixel',
                    details: { item: item.name, price: item.price, ingredientsUsed: item.ingredients, cashAfter: gameState.cash, stockAfter: { ...gameState.stock } }
                }, date);
            } else {
                logMessage({
                    type: 'SALE_FAIL',
                    message: `Couldn't make ${item.name}. Out of ingredients!`,
                    color: 'text-red-pixel',
                    details: { item: item.name, missing: item.ingredients }
                }, date);
            }
        }
        
        function buyIngredient(ingredientKey, amount) {
            if (gameState.isGameOver || amount <= 0) return;
            const ingredient = INGREDIENTS[ingredientKey];
            const cost = ingredient.cost * amount;

            if (gameState.cash >= cost) {
                gameState.cash -= cost;
                gameState.stock[ingredientKey] += amount;
                logMessage({
                    type: 'INVENTORY',
                    message: `Bought ${amount} ${ingredient.name} for $${cost}.`,
                    color: 'text-blue-pixel',
                    details: { item: ingredient.name, amount, cost, cashAfter: gameState.cash, stockAfter: { ...gameState.stock } }
                });
                updateUI();
            } else {
                logMessage({ type: 'INVENTORY_FAIL', message: `Not enough cash to buy ${ingredient.name}.`, color: 'text-red-pixel', details: { item: ingredient.name, cost } });
                updateUI();
            }
        }
        
        function hireEmployee() {
             if (gameState.isGameOver) return;
             const cook = EMPLOYEE_TYPES.cook;
             gameState.employees.push({ ...cook });
             logMessage({ type: 'HIRE', message: `Hired a ${cook.name} for $${cook.salary}/day.`, color: 'text-blue-pixel', details: { employee: cook } });
             updateUI();
        }

        function endGame(message) {
            gameState.isGameOver = true;
            gameOverMessage.textContent = message;
            gameOverModal.classList.remove('hidden');
        }

        // --- UI & MODAL FUNCTIONS ---
        function updateUI() {
            dayDisplay.textContent = gameState.day;
            timezoneDisplay.textContent = gameState.timeZone.toUpperCase();
            cashDisplay.textContent = `$${gameState.cash}`;
            revenueDisplay.textContent = `$${gameState.dailyRevenue}`;
            expensesDisplay.textContent = `$${gameState.dailyExpenses}`;
            cashDisplay.className = `text-2xl ${gameState.cash >= 0 ? 'text-green-pixel' : 'text-red-pixel'}`;

            menuItemsContainer.innerHTML = '';
            gameState.unlockedMenuItems.forEach(key => {
                const item = MENU[key];
                const ingredientsText = Object.entries(item.ingredients).map(([ingKey, amount]) => `${amount} ${INGREDIENTS[ingKey].name}`).join(', ');
                menuItemsContainer.innerHTML += `<div><p class="font-bold">${item.name} - <span class="text-green-pixel">$${item.price}</span></p><p class="text-xs text-gray-400">${ingredientsText}</p></div>`;
            });

            employeeListContainer.innerHTML = gameState.employees.length === 0 ? `<p class="text-gray-400">No employees yet.</p>` : gameState.employees.map((emp, index) => `<div class="flex justify-between items-center"><p>${emp.name} #${index + 1}</p><p class="text-red-pixel">-$${emp.salary}/day</p></div>`).join('');

            stockItemsContainer.innerHTML = '';
            gameState.unlockedIngredients.forEach(key => {
                const ingredient = INGREDIENTS[key];
                stockItemsContainer.innerHTML += `<div class="grid grid-cols-3 items-center gap-2"><span class="col-span-1">${ingredient.name}: ${gameState.stock[key]}</span><div class="col-span-2 flex gap-1"><button class="btn flex-1 py-1 text-xs rounded" onclick="buyIngredient('${key}', 5)">+5 ($${ingredient.cost * 5})</button><button class="btn flex-1 py-1 text-xs rounded" onclick="buyIngredient('${key}', 10)">+10 ($${ingredient.cost * 10})</button></div></div>`;
            });
            
            renderLog();
        }

        function logMessage(logObject, date = new Date()) {
            logObject.timestamp = formatTimestamp(date);
            logObject.raw_timestamp = date.toISOString();
            gameState.log.unshift(logObject);
            if (gameState.log.length > 200) gameState.log.pop();
            if(document.body.contains(gameLogContainer)) renderLog();
        }
        
        function renderLog() {
            gameLogContainer.innerHTML = gameState.log.map(log => `<p class="log-message pb-1 ${log.color}">[${log.timestamp}] ${log.message}</p>`).join('');
        }

        function toggleTimezone() {
            gameState.timeZone = gameState.timeZone === 'local' ? 'UTC' : 'local';
            // Re-format all existing log timestamps
            gameState.log.forEach(log => {
                log.timestamp = formatTimestamp(new Date(log.raw_timestamp));
            });
            updateUI();
        }

        function showJsonLog() {
            // Create a deep copy to avoid modifying original log with formatted timestamps
            const logCopy = JSON.parse(JSON.stringify(gameState.log));
            logCopy.forEach(log => {
                log.timestamp = formatTimestamp(new Date(log.raw_timestamp));
                delete log.raw_timestamp; // Clean up for export
            });
            jsonLogTextarea.value = JSON.stringify(logCopy, null, 2);
            jsonLogModal.classList.remove('hidden');
        }

        function hideJsonLog() { jsonLogModal.classList.add('hidden'); }

        function copyLogToClipboard() {
            jsonLogTextarea.select();
            try {
                document.execCommand('copy');
                copyLogBtn.textContent = 'Copied!';
                setTimeout(() => { copyLogBtn.textContent = 'Copy to Clipboard'; }, 2000);
            } catch (err) {
                console.error('Failed to copy log: ', err);
                copyLogBtn.textContent = 'Error!';
                setTimeout(() => { copyLogBtn.textContent = 'Copy to Clipboard'; }, 2000);
            }
        }

        // --- EVENT LISTENERS ---
        nextDayBtn.addEventListener('click', nextDay);
        hireBtn.addEventListener('click', hireEmployee);
        restartBtn.addEventListener('click', initGame);
        timezoneBtn.addEventListener('click', toggleTimezone);
        jsonLogBtn.addEventListener('click', showJsonLog);
        closeLogBtn.addEventListener('click', hideJsonLog);
        copyLogBtn.addEventListener('click', copyLogToClipboard);

        // --- INITIALIZE GAME ---
        window.onload = initGame;
    </script>

</body>
</html>
